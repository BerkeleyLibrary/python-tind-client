name: Build and publish dev release to PyPI

on:
  pull_request:
    branches:
      - main
    # types:
    #   - closed

jobs:
  build:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"
          python-version: "3.14"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Build Python package
        run: |
          uv build
      
      - name: Upload package distributions as artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: |
            dist/
            !dist/.gitignore

  testpypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/python-tind-client
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download built package distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Public package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
